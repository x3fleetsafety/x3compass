<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none" role="img" aria-label="X3 Compass">
  <defs>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo -->
  <circle cx="36" cy="36" r="34" fill="url(#glow)"/>

  <!-- Outer rings -->
  <circle cx="36" cy="36" r="30" stroke="url(#rose)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="36" cy="36" r="26" stroke="url(#rose)" stroke-width="2.5" fill="none"/>

  <!-- Cardinal tick marks -->
  <g stroke="#2DD4BF" stroke-width="1.2" opacity="0.6">
    <line x1="36" y1="6" x2="36" y2="11"/>
    <line x1="36" y1="61" x2="36" y2="66"/>
    <line x1="6" y1="36" x2="11" y2="36"/>
    <line x1="61" y1="36" x2="66" y2="36"/>
  </g>

  <!-- Cardinal direction labels -->
  <g font-family="ui-monospace, monospace" font-size="6" font-weight="700" fill="#67E8F9" opacity="0.75">
    <text x="36" y="11.5" text-anchor="middle">N</text>
    <text x="36" y="65" text-anchor="middle">S</text>
    <text x="10" y="38.5" text-anchor="middle">W</text>
    <text x="62" y="38.5" text-anchor="middle">E</text>
  </g>

  <!-- Compass rose — major (N-S-E-W) points -->
  <path d="M36 14 L40 36 L36 58 L32 36 Z" fill="url(#rose)" opacity="0.9"/>
  <path d="M14 36 L36 32 L58 36 L36 40 Z" fill="url(#rose)" opacity="0.6"/>

  <!-- Red North needle overlay -->
  <path d="M36 14 L38.5 36 L36 36 Z" fill="#EF4444"/>
  <path d="M36 14 L33.5 36 L36 36 Z" fill="#DC2626"/>

  <!-- Center pin -->
  <circle cx="36" cy="36" r="3.5" fill="#0A1929" stroke="url(#rose)" stroke-width="1.5"/>
  <circle cx="36" cy="36" r="1.2" fill="#2DD4BF"/>
</svg>
