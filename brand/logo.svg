<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none" role="img" aria-label="X3 Compass">
  <defs>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="50.01%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo -->
  <circle cx="36" cy="36" r="34" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="36" cy="36" r="30" stroke="url(#rose)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="36" cy="36" r="26" stroke="url(#rose)" stroke-width="2.5" fill="none"/>

  <!-- Degree tick marks (24 ticks around) -->
  <g stroke="#2DD4BF" stroke-width="1" opacity="0.5">
    <line x1="36" y1="6"  x2="36" y2="11"/>
    <line x1="36" y1="61" x2="36" y2="66"/>
    <line x1="6"  y1="36" x2="11" y2="36"/>
    <line x1="61" y1="36" x2="66" y2="36"/>
  </g>
  <g stroke="#22D3EE" stroke-width="0.8" opacity="0.35">
    <!-- diagonal ticks -->
    <line x1="14.7" y1="14.7" x2="18.2" y2="18.2"/>
    <line x1="53.8" y1="14.7" x2="57.3" y2="18.2"/>
    <line x1="14.7" y1="57.3" x2="18.2" y2="53.8"/>
    <line x1="53.8" y1="57.3" x2="57.3" y2="53.8"/>
  </g>

  <!-- Cardinal direction labels (subtle) -->
  <g font-family="Inter, sans-serif" font-size="6" font-weight="700" fill="#67E8F9" opacity="0.7">
    <text x="36" y="11" text-anchor="middle">N</text>
    <text x="36" y="65" text-anchor="middle">S</text>
    <text x="10" y="38" text-anchor="middle">W</text>
    <text x="62" y="38" text-anchor="middle">E</text>
  </g>

  <!-- Compass rose — 8 point star -->
  <!-- Major (cardinal) points -->
  <path d="M36 14 L40 36 L36 58 L32 36 Z" fill="url(#rose)" opacity="0.85"/>
  <path d="M14 36 L36 32 L58 36 L36 40 Z" fill="url(#rose)" opacity="0.55"/>
  <!-- Minor (intercardinal) points - diagonals at 45° -->
  <path d="M20.7 20.7 L36 33 L33 36 L20.7 51.3 L18.7 36 Z" fill="url(#rose)" opacity="0.25" transform="rotate(45 36 36)"/>

  <!-- North needle (red half) overlaid -->
  <path d="M36 14 L38.5 36 L36 36 Z" fill="#EF4444"/>
  <path d="M36 14 L33.5 36 L36 36 Z" fill="#DC2626"/>

  <!-- Center pin -->
  <circle cx="36" cy="36" r="3.5" fill="#0A1929" stroke="url(#rose)" stroke-width="1.5"/>
  <circle cx="36" cy="36" r="1.2" fill="#2DD4BF"/>

  <!-- Wordmark — much wider viewBox now, no clipping -->
  <text x="84" y="46" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="32" letter-spacing="-1" fill="#F8FAFC">X3 <tspan fill="url(#word)">Compass</tspan></text>
</svg>
